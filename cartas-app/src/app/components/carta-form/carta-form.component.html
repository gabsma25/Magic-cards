<ion-header>
  <ion-toolbar class="toolbar-grixis">
    <ion-title>{{ tituloModal }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancelar()">Cancelar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="form-grixis">
  <ion-list class="form-lista" lines="none">
    <ion-item class="form-item">
      <ion-input
        label="Nome"
        labelPlacement="stacked"
        [(ngModel)]="form.nome"
        placeholder="Ex: Lightning Bolt"
      ></ion-input>
    </ion-item>

    <ion-item class="form-item">
      <ion-input
        label="Tipo"
        labelPlacement="stacked"
        [(ngModel)]="form.tipo"
        placeholder="Ex: Mágica Instantânea"
      ></ion-input>
    </ion-item>

    <ion-item class="form-item">
      <ion-textarea
        label="Conteúdo / texto"
        labelPlacement="stacked"
        [(ngModel)]="form.conteudo"
        [autoGrow]="true"
        placeholder="Ex: Cause 3 de dano a qualquer alvo."
      ></ion-textarea>
    </ion-item>

    <ion-item class="form-item">
      <ion-input
        label="Custo de mana"
        labelPlacement="stacked"
        [(ngModel)]="form.custo_mana"
        placeholder="Ex: {1}{U}{B}{R}"
      ></ion-input>
    </ion-item>

    <ion-item class="form-item">
      <ion-input
        label="Valor de mana (CMC)"
        labelPlacement="stacked"
        type="number"
        [(ngModel)]="form.valor_mana"
      ></ion-input>
    </ion-item>

    <ion-item class="form-item">
      <ion-input
        label="Preço (R$)"
        labelPlacement="stacked"
        type="number"
        [(ngModel)]="form.preco"
      ></ion-input>
    </ion-item>
  </ion-list>

  <ion-button class="botao-salvar" expand="block" (click)="salvar()">
    Salvar
  </ion-button>
</ion-content>
